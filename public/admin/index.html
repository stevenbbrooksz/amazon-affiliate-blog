<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Begin OS</title>
    <style>
      :root {
        color-scheme: light;
        --begin-bg: #f0f0f1;
        --begin-panel: #fff;
        --begin-border: #dcdcde;
        --begin-ink: #1d2327;
        --begin-accent: #ea580c;
        --begin-accent-dark: #c2410c;
      }

      body {
        margin: 0;
        background: var(--begin-bg);
        color: var(--begin-ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }

      body::before {
        content: "Begin OS";
        position: fixed;
        left: 24px;
        bottom: 18px;
        z-index: 9999;
        border-radius: 999px;
        background: var(--begin-ink);
        color: #fff;
        font: 700 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: .08em;
        padding: 10px 14px;
        text-transform: uppercase;
        pointer-events: none;
        box-shadow: 0 12px 30px rgb(15 23 42 / 18%);
      }

      [class*="AppHeader"] {
        background: var(--begin-ink) !important;
        border-color: #000 !important;
        box-shadow: 0 1px 0 rgb(0 0 0 / 24%) !important;
      }

      [class*="AppHeader"] a,
      [class*="AppHeader"] button,
      [class*="AppHeader"] span {
        color: #fff !important;
      }

      [class*="Dropdown"],
      [class*="Menu"],
      [class*="Popover"] {
        color: var(--begin-ink) !important;
      }

      button,
      a {
        border-radius: 4px !important;
      }

      [class*="Button"],
      button[type="submit"] {
        box-shadow: none !important;
      }

      [class*="Button"][class*="primary"],
      button[type="submit"] {
        background: var(--begin-accent) !important;
        border-color: var(--begin-accent) !important;
      }

      [class*="Button"][class*="primary"]:hover,
      button[type="submit"]:hover {
        background: var(--begin-accent-dark) !important;
        border-color: var(--begin-accent-dark) !important;
      }

      [class*="Sidebar"],
      [class*="CollectionTop"],
      [class*="CollectionMain"] {
        border-color: var(--begin-border) !important;
      }

      input,
      textarea,
      select {
        border-color: #8c8f94 !important;
        border-radius: 4px !important;
        box-shadow: none !important;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--begin-accent) !important;
        box-shadow: 0 0 0 1px var(--begin-accent) !important;
      }

      [class*="PreviewPane"],
      [class*="PreviewCard"],
      [class*="EditorPreview"] {
        display: none !important;
      }

      a[href*="decap"],
      a[href*="netlifycms"],
      [aria-label*="Decap"],
      [title*="Decap"],
      [class*="decap"],
      [class*="Decap"],
      [class*="NetlifyCreditIcon"],
      [class*="IconWrapper-NetlifyCreditIcon"] {
        display: none !important;
      }

      [class*="IconWrapper-NetlifyCreditIcon"],
      [class*="NetlifyCreditIcon"],
      [data-begin-hidden-brand] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.CMS.init({
        config: {
          display_url: 'Begin OS',
          logo_url: '/favicon.svg',
          show_preview_links: true,
        },
      });

      function findBrandContainer(node) {
        var current = node;
        var candidate = node;

        while (current && current.parentElement && current.parentElement !== document.body) {
          var text = (current.parentElement.textContent || '').trim().toLowerCase();
          if (text && text.length <= 40 && text.includes('decap')) {
            candidate = current.parentElement;
            current = current.parentElement;
            continue;
          }
          break;
        }

        return candidate;
      }

      function hideDecapBranding() {
        document.querySelectorAll('a, div, span, p, svg').forEach(function (node) {
          var text = (node.textContent || '').trim().toLowerCase();
          var isDecapCreditSvg =
            node.tagName && node.tagName.toLowerCase() === 'svg' && node.getAttribute('viewBox') === '0 0 335 90';
          var isDecapCreditClass =
            typeof node.className === 'string' && node.className.toLowerCase().includes('netlifycrediticon');

          if (text === 'decap' || text.includes('decap cms') || isDecapCreditSvg || isDecapCreditClass) {
            var target = findBrandContainer(node.closest('a') || node);
            if (target && target !== document.body) {
              target.setAttribute('data-begin-hidden-brand', 'true');
            }
          }
        });
      }

      hideDecapBranding();
      new MutationObserver(hideDecapBranding).observe(document.body, { childList: true, subtree: true });
      window.setInterval(hideDecapBranding, 500);
    </script>
  </body>
</html>
