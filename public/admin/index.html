<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Begin OS</title>
    <style>
      :root {
        color-scheme: light;
        --begin-bg: #f8fafc;
        --begin-ink: #0f172a;
        --begin-accent: #ea580c;
      }

      body {
        margin: 0;
        background: var(--begin-bg);
      }

      body::before {
        content: "Begin OS";
        position: fixed;
        left: 24px;
        bottom: 18px;
        z-index: 9999;
        border-radius: 999px;
        background: var(--begin-ink);
        color: #fff;
        font: 700 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: .08em;
        padding: 10px 14px;
        text-transform: uppercase;
        pointer-events: none;
        box-shadow: 0 12px 30px rgb(15 23 42 / 18%);
      }

      [class*="AppHeader"] {
        background: var(--begin-ink) !important;
      }

      [class*="AppHeader"] a,
      [class*="AppHeader"] button,
      [class*="AppHeader"] span {
        color: #fff !important;
      }

      [class*="AppHeader"]::before {
        content: "Begin OS";
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        margin-left: 18px;
        color: #fff;
        font: 900 18px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: -.02em;
      }

      button,
      a {
        border-radius: 8px !important;
      }

      [class*="Button"],
      button[type="submit"] {
        box-shadow: none !important;
      }

      [class*="Button"][class*="primary"],
      button[type="submit"] {
        background: var(--begin-accent) !important;
        border-color: var(--begin-accent) !important;
      }

      a[href*="decap"],
      a[href*="netlifycms"],
      [aria-label*="Decap"],
      [title*="Decap"],
      [class*="decap"],
      [class*="Decap"] {
        display: none !important;
      }

      body > div > div:last-child:has(svg + span),
      body > div > div:last-child:has(img + span),
      body > div > div:last-child:has(a[href*="decap"]) {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.CMS.init({
        config: {
          display_url: 'Begin OS',
          logo_url: '/favicon.svg',
          show_preview_links: true,
        },
      });

      function hideDecapBranding() {
        document.querySelectorAll('a, div, span, p').forEach(function (node) {
          var text = (node.textContent || '').trim().toLowerCase();
          if (text === 'decap' || text.includes('decap cms')) {
            var target = node.closest('a') || node.parentElement;
            if (target && target !== document.body) {
              target.style.display = 'none';
            }
          }
        });
      }

      hideDecapBranding();
      window.setInterval(hideDecapBranding, 500);
    </script>
  </body>
</html>
