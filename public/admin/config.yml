backend:
  name: github
  repo: stevenbbrooksz/amazon-affiliate-blog
  branch: main
  base_url: https://amazon-affiliate-blog.pages.dev
  auth_endpoint: /auth

local_backend: true
media_folder: public/uploads
public_folder: /uploads
publish_mode: editorial_workflow
display_url: Begin OS
logo_url: /favicon.svg
show_preview_links: true

collections:
  - name: settings
    label: Begin OS Settings
    files:
      - name: affiliate
        label: Site Design & Settings
        file: content/settings/affiliate.md
        fields:
          - { label: Site name, name: siteName, widget: string }
          - { label: Logo prefix text, name: siteNamePrefix, widget: string, required: false }
          - { label: Logo accent text, name: siteNameAccent, widget: string, required: false }
          - { label: Site URL, name: siteUrl, widget: string }
          - { label: Default SEO title, name: defaultSeoTitle, widget: string }
          - { label: Default SEO description, name: defaultSeoDescription, widget: text }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: Hero title, name: heroTitle, widget: string }
          - { label: Hero highlighted title text, name: heroTitleAccent, widget: string, required: false }
          - { label: Hero description, name: heroDescription, widget: text }
          - { label: Hero background image URL, name: heroImageUrl, widget: string }
          - { label: Footer description, name: footerDescription, widget: text }
          - { label: About title, name: aboutTitle, widget: string }
          - { label: About body, name: aboutBody, widget: text }
          - { label: About commitment title, name: aboutCommitmentTitle, widget: string }
          - { label: About commitment body, name: aboutCommitmentBody, widget: text }
          - { label: Contact title, name: contactTitle, widget: string }
          - { label: Contact description, name: contactDescription, widget: text }
          - { label: Primary button label, name: primaryCtaLabel, widget: string }
          - { label: Primary button URL, name: primaryCtaUrl, widget: string }
          - { label: Font family, name: fontFamily, widget: string }
          - { label: Accent 50, name: accent50, widget: color }
          - { label: Accent 100, name: accent100, widget: color }
          - { label: Accent 200, name: accent200, widget: color }
          - { label: Accent 400, name: accent400, widget: color }
          - { label: Accent 500, name: accent500, widget: color }
          - { label: Accent 600, name: accent600, widget: color }
          - { label: Accent 700, name: accent700, widget: color }
          - { label: Page background, name: surfaceColor, widget: color }
          - { label: Text color, name: inkColor, widget: color }
          - { label: Dark section color, name: darkColor, widget: color }
          - label: Amazon Affiliate ID
            name: amazonAffiliateId
            widget: string
            hint: "Amazon Associates tracking ID, for example yourtag-20. The site adds it to amazon.com links as the tag parameter."
          - label: Google Analytics ID
            name: googleAnalyticsId
            widget: string
            required: false
            hint: "GA4 measurement ID, for example G-XXXXXXXXXX. Leave blank to disable Google Analytics."

  - name: guides
    label: Begin OS Guides
    folder: content/guides
    create: true
    slug: "{{fields.slug}}"
    preview_path: "guides/{{fields.slug}}"
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - label: Slug
        name: slug
        widget: string
        pattern:
          - "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          - Use lowercase kebab-case, for example home-office-smart-gadgets.
      - { label: Sort order, name: order, widget: number, value_type: int, default: 100 }
      - { label: Title, name: title, widget: string }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: SEO description, name: description, widget: text }
      - { label: Published date, name: date, widget: date, format: "YYYY-MM-DD" }
      - label: Publish time
        name: publishAt
        widget: datetime
        required: false
        hint: "Optional scheduled publish time. Future-dated guides are excluded during build until this time has passed."
      - { label: Author, name: author, widget: string, default: "Alex Chen" }
      - { label: Category, name: category, widget: string }
      - { label: Header image URL, name: headerImage, widget: string }
      - { label: Reading time, name: readingTime, widget: string, default: "5 min read" }
      - label: Recommended products
        name: recommendedProducts
        widget: list
        required: false
        fields:
          - { label: Product ID, name: id, widget: string }
          - { label: Name, name: name, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Price, name: price, widget: string, required: false }
          - { label: Rating, name: rating, widget: string, required: false }
          - { label: Image URL, name: imageUrl, widget: string }
          - label: Affiliate URL
            name: affiliateUrl
            widget: string
            hint: "Use a clean amazon.com product/search URL. The site-wide Amazon Affiliate ID is added automatically."
          - { label: Category, name: category, widget: string }
      - label: FAQ
        name: faqs
        widget: list
        required: false
        fields:
          - { label: Question, name: question, widget: string }
          - { label: Answer, name: answer, widget: text }
      - label: Body
        name: body
        widget: markdown
        hint: "Use Markdown. The first paragraph should summarize the guide, then use ## headings and bullet lists."
