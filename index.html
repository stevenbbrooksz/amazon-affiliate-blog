  <head>
    <script>
      // Fix for libraries that try to overwrite window.fetch (e.g. formdata-polyfill)
      // in environments where it is a getter-only property.
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Prevented attempt to overwrite window.fetch.');
            }
          });
        } catch (e) {}
      })();
    </script>
